name: CD

# Deploys on every push to main. Contracts deploy first; the relayer and
# frontend deploy after, each wired to the addresses *this run* just
# deployed (via job outputs) rather than a stale hand-maintained secret —
# unlike a naive setup where a redeployed contract silently goes unused
# because downstream services still point at an old address.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────── Deploy smart contracts ──────────────────────
  deploy-contract:
    name: Deploy contract (Stellar testnet)
    runs-on: ubuntu-latest
    outputs:
      zk_verifier: ${{ steps.addresses.outputs.zk_verifier }}
      escrow_vault: ${{ steps.addresses.outputs.escrow_vault }}
      order_book: ${{ steps.addresses.outputs.order_book }}
      settlement: ${{ steps.addresses.outputs.settlement }}
      matching_engine: ${{ steps.addresses.outputs.matching_engine }}
      deployed: ${{ steps.addresses.outputs.deployed }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (+ wasm32v1-none target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      # Fallback system libs in case binstall has to compile from source
      # (stellar-cli's hardware-wallet/keyring crates link dbus-1 and libudev).
      - name: Install Stellar CLI build deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      # Pulls the prebuilt stellar binary — no native compilation needed.
      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli

      - name: Deploy and initialize contracts
        id: addresses
        working-directory: contracts
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
          RELAYER_ADDRESS: ${{ vars.RELAYER_ADDRESS || 'GD7ZTJ6XFHONCB5P52LBXOG2DQUOOKAWXPKTCTJCHI352RCWPKUBMG6Z' }}
        run: |
          set -euo pipefail

          if [ -z "$STELLAR_SECRET_KEY" ]; then
            echo "::warning::STELLAR_SECRET_KEY not set — skipping contract deploy. Add it in repo Settings → Secrets and variables → Actions to enable this job."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Import the funded deployer key under the alias scripts/deploy.sh
          # and scripts/initialize.sh expect ("darkpool-deployer").
          printf '%s\n' "$STELLAR_SECRET_KEY" | stellar keys add darkpool-deployer --secret-key --overwrite

          ./scripts/build.sh
          ./scripts/deploy.sh
          ./scripts/initialize.sh

          # deploy.sh writes the 5 fresh addresses into ../.env — surface them
          # as job outputs so deploy-relayer and deploy-frontend below build
          # against what was *actually just deployed*, not a stale value.
          # shellcheck disable=SC1091
          source ../.env
          {
            echo "zk_verifier=$ZK_VERIFIER_ADDRESS"
            echo "escrow_vault=$ESCROW_VAULT_ADDRESS"
            echo "order_book=$ORDER_BOOK_ADDRESS"
            echo "settlement=$SETTLEMENT_ADDRESS"
            echo "matching_engine=$MATCHING_ENGINE_ADDRESS"
            echo "deployed=true"
          } >> "$GITHUB_OUTPUT"

  # ────────────────────────── Deploy relayer ───────────────────────────
  deploy-relayer:
    name: Deploy relayer (Render)
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    if: needs.deploy-contract.outputs.deployed == 'true'
    steps:
      - name: Update Render env vars and redeploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::warning::RENDER_API_KEY / RENDER_SERVICE_ID not set — skipping relayer redeploy. Add both in repo Settings → Secrets and variables → Actions to enable this job."
            exit 0
          fi

          # PUT .../env-vars/{key} upserts ONE variable — unlike the plural
          # .../env-vars endpoint (full replace), this cannot clobber unrelated
          # relayer config (Mongo URI, batch interval, port, etc).
          set_env_var() {
            curl -sf -X PUT "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$1" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"value\": \"$2\"}" > /dev/null
            echo "    set $1"
          }

          echo "==> Updating relayer env vars to the newly deployed addresses..."
          set_env_var ZK_VERIFIER_ADDRESS     "${{ needs.deploy-contract.outputs.zk_verifier }}"
          set_env_var ESCROW_VAULT_ADDRESS    "${{ needs.deploy-contract.outputs.escrow_vault }}"
          set_env_var ORDER_BOOK_ADDRESS      "${{ needs.deploy-contract.outputs.order_book }}"
          set_env_var SETTLEMENT_ADDRESS      "${{ needs.deploy-contract.outputs.settlement }}"
          set_env_var MATCHING_ENGINE_ADDRESS "${{ needs.deploy-contract.outputs.matching_engine }}"

          echo "==> Triggering Render deploy..."
          curl -sf -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'

  # ────────────────────────── Deploy frontend ──────────────────────────
  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [deploy-contract, deploy-relayer]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || 'team_CItqKbVUksF6aywbkwxXgAgI' }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || 'prj_8NFJ6bSlKbr5ZewQ9K6PAAiWWXZz' }}
        run: |
          set -euo pipefail

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping Vercel deploy. Add it in repo Settings → Secrets and variables → Actions to enable this job."
            exit 0
          fi

          # .vercel/project.json is gitignored; VERCEL_ORG_ID + VERCEL_PROJECT_ID
          # env vars are Vercel's documented way to skip interactive `vercel link`.
          npx --yes vercel deploy --prod --yes --token "$VERCEL_TOKEN" \
            -b NEXT_PUBLIC_ZK_VERIFIER_ADDRESS="${{ needs.deploy-contract.outputs.zk_verifier }}" \
            -b NEXT_PUBLIC_ESCROW_VAULT_ADDRESS="${{ needs.deploy-contract.outputs.escrow_vault }}" \
            -b NEXT_PUBLIC_ORDER_BOOK_ADDRESS="${{ needs.deploy-contract.outputs.order_book }}" \
            -b NEXT_PUBLIC_SETTLEMENT_ADDRESS="${{ needs.deploy-contract.outputs.settlement }}" \
            -b NEXT_PUBLIC_MATCHING_ENGINE_ADDRESS="${{ needs.deploy-contract.outputs.matching_engine }}" \
            -b NEXT_PUBLIC_STELLAR_NETWORK=testnet \
            -b NEXT_PUBLIC_STELLAR_RPC_URL=https://soroban-testnet.stellar.org \
            -b NEXT_PUBLIC_STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org \
            -b NEXT_PUBLIC_XLM_TOKEN_ADDRESS=native \
            -b NEXT_PUBLIC_USDC_TOKEN_ADDRESS=CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA \
            -b NEXT_PUBLIC_RELAYER_URL="${{ vars.RELAYER_URL || 'http://localhost:3001' }}"
